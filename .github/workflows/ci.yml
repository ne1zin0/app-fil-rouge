name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: ./api
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "ENV=$APP_ENV ; token len =${Docker_TOKEN}"
        env:
         APP_ENV: ${{ vars.APP_ENV }}
         Docker_TOKEN: ${{ secrets.Docker_TOKEN }}
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./api/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: ./api
      - name: Run tests
        run: npm test
        working-directory: ./api
      - name: Run tests with coverage
        run: mkdir -p coverage && NODE_V8_COVERAGE=coverage node --test --experimental-test-coverage
        working-directory: ./api
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with: { name: coverage, path: ./api/coverage }
        if: always()